name: Daily Report

on:
  schedule:
    # Run every day at 6:59 AM UTC (11:59 PM PT / 2:59 AM ET)
    - cron: '59 6 * * *'
  workflow_dispatch:
    # Allow manual triggering from GitHub Actions UI

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Send daily report
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          CHOQUER_RESEND_API_KEY: ${{ secrets.CHOQUER_RESEND_API_KEY }}
          CHOQUER_FROM_EMAIL: ${{ secrets.CHOQUER_FROM_EMAIL }}
          REPORT_TO_EMAIL: ${{ secrets.REPORT_TO_EMAIL }}
        run: npx tsx scripts/daily-report.ts
