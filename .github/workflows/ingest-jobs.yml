name: Daily Job Ingestion

on:
  schedule:
    # Run every day at 8:00 AM UTC (3:00 AM PT / 4:00 AM ET)
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Allow manual triggering from GitHub Actions UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Step 1: Find and post new jobs
      - name: Run ingestion pipeline
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MIN_RELEVANCE_SCORE: '5'
        run: npx tsx scripts/ingest-jobs.ts

      # Step 2: Send "your job is live" webflow.jobs emails
      - name: Run outreach pipeline
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          OUTREACH_HMAC_SECRET: ${{ secrets.OUTREACH_HMAC_SECRET }}
          NEXT_PUBLIC_SITE_URL: 'https://www.webflow.jobs'
        run: npx tsx scripts/outreach-jobs.ts

      # Step 3: Send Choquer Agency pitch emails (only to businesses
      # whose webflow.jobs email was sent 20+ hours ago — yesterday's jobs)
      - name: Run agency lead generation pipeline
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          CHOQUER_RESEND_API_KEY: ${{ secrets.CHOQUER_RESEND_API_KEY }}
          CHOQUER_FROM_EMAIL: ${{ secrets.CHOQUER_FROM_EMAIL }}
          CHOQUER_HMAC_SECRET: ${{ secrets.CHOQUER_HMAC_SECRET }}
          CHOQUER_SITE_URL: ${{ secrets.CHOQUER_SITE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SITE_URL: 'https://www.webflow.jobs'
        run: npx tsx scripts/outreach-agency.ts
